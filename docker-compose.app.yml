version: "3.9"

services:
  # ── DB Init (one-shot) ───────────────────────────────────────────────────────
  init:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: archiver_init
    command: python scripts/init_db.py
    env_file: .env
    restart: "no"

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  worker:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: archiver_worker
    command: celery -A src.celery_app worker --loglevel=${LOG_LEVEL:-INFO} --concurrency=4
    env_file: .env
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs

  # ── Celery Beat (scheduler) ──────────────────────────────────────────────────
  beat:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: archiver_beat
    command: celery -A src.celery_app beat --loglevel=${LOG_LEVEL:-INFO} --scheduler celery.beat:PersistentScheduler --schedule=/app/celerybeat-data/celerybeat-schedule
    env_file: .env
    depends_on:
      init:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - ./config:/app/config:ro
      - celerybeat_data:/app/celerybeat-data

volumes:
  celerybeat_data:
